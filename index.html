<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AJUI · Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #faf9f6;
    --surface:  #ffffff;
    --border:   #e8e4dc;
    --accent:   #2d5a3d;
    --accent2:  #c4622d;
    --text:     #1c1c1a;
    --muted:    #8a8680;
    --light:    #f0ede6;
    --radius:   14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "DM Sans", sans-serif;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--accent);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,.06) 0%, transparent 70%);
    pointer-events: none;
  }
  header h1 {
    font-family: "Fraunces", serif;
    font-size: clamp(2rem, 7vw, 3rem);
    color: #fff;
    font-weight: 300;
    letter-spacing: .02em;
    position: relative;
  }
  header h1 span {
    font-style: italic;
    font-weight: 600;
  }
  header p {
    color: rgba(255,255,255,.6);
    font-size: .8rem;
    margin-top: .35rem;
    position: relative;
  }

  /* ── Selector de año ── */
  .year-bar {
    display: flex;
    justify-content: center;
    gap: .5rem;
    padding: 1.1rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .year-btn {
    background: var(--light);
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-family: "DM Sans", sans-serif;
    font-size: .82rem;
    font-weight: 600;
    padding: .45rem 1.2rem;
    border-radius: 999px;
    cursor: pointer;
    transition: all .18s;
    letter-spacing: .03em;
  }
  .year-btn:hover { border-color: var(--accent); color: var(--accent); }
  .year-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ── Stats ── */
  .stats {
    display: flex;
    gap: .75rem;
    justify-content: center;
    flex-wrap: wrap;
    padding: 1.25rem 1rem .5rem;
    max-width: 900px;
    margin: 0 auto;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: .7rem 1.2rem;
    text-align: center;
    min-width: 110px;
    flex: 1;
    max-width: 160px;
  }
  .stat .n {
    font-family: "Fraunces", serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }
  .stat .l {
    font-size: .65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-top: .25rem;
  }

  /* ── Calendario ── */
  .cal {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    padding: 1rem;
    max-width: 1080px;
    margin: 0 auto;
  }

  .mes-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem;
    width: 288px;
    transition: box-shadow .2s;
  }
  .mes-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.07); }

  .mes-titulo {
    font-family: "Fraunces", serif;
    font-size: .95rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: .9rem;
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .grid-sem {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 4px;
  }
  .grid-sem div {
    text-align: center;
    font-size: .58rem;
    color: var(--muted);
    font-weight: 600;
    padding: 2px 0;
    letter-spacing: .04em;
  }

  .grid-dias {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .c {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: .72rem;
    border-radius: 7px;
    color: #d0cdc8;
    position: relative;
    font-weight: 400;
  }
  .ev {
    background: #eef5f1;
    color: var(--text);
    cursor: pointer;
    font-weight: 600;
    border: 1.5px solid #c8dfd0;
    transition: all .15s;
  }
  .ev:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    transform: scale(1.1);
  }
  .badge {
    position: absolute;
    top: 1px; right: 1px;
    background: var(--accent2);
    color: #fff;
    font-size: .45rem;
    font-weight: 700;
    border-radius: 999px;
    width: 11px; height: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Estado vacío ── */
  .vacio {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-size: .9rem;
  }

  /* ── Modal ── */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(28,28,26,.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(3px);
  }
  .overlay.on { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 18px;
    padding: 1.8rem;
    max-width: 430px;
    width: 100%;
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.18);
    animation: slideUp .22s ease;
    max-height: 88vh;
    overflow-y: auto;
  }
  @keyframes slideUp {
    from { opacity:0; transform: translateY(18px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--light);
    border: none;
    color: var(--muted);
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .modal-close:hover { background: var(--accent); color: #fff; }

  .modal-tag {
    display: inline-block;
    background: #eef5f1;
    color: var(--accent);
    font-size: .65rem;
    font-weight: 700;
    padding: .2rem .6rem;
    border-radius: 999px;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: .6rem;
  }
  .modal-lugar {
    font-family: "Fraunces", serif;
    font-size: 1.4rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: .2rem;
    line-height: 1.2;
    padding-right: 2rem;
  }
  .modal-fecha {
    font-size: .8rem;
    color: var(--muted);
    margin-bottom: 1.2rem;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: .9rem 0;
  }

  .fila {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: .38rem 0;
    font-size: .82rem;
  }
  .fila .lbl { color: var(--muted); }
  .fila .val { font-weight: 600; color: var(--text); }
  .fila .val.verde { color: var(--accent); font-size: .95rem; }
  .fila .val.rojo  { color: var(--accent2); }

  .nota-box {
    margin-top: .9rem;
    background: #fffbf0;
    border-left: 3px solid #e8b84b;
    padding: .65rem .9rem;
    border-radius: 0 8px 8px 0;
    font-size: .8rem;
    color: var(--text);
    line-height: 1.5;
  }

  .nav-ev {
    display: flex;
    gap: .4rem;
    flex-wrap: wrap;
    margin-bottom: .9rem;
  }
  .nav-ev button {
    flex: 1; min-width: 90px;
    background: var(--light);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: .35rem .5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: .72rem;
    font-family: "DM Sans", sans-serif;
    font-weight: 500;
    transition: all .15s;
  }
  .nav-ev button.on {
    background: #eef5f1;
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .aviso {
    font-size: .72rem;
    color: var(--muted);
    margin-bottom: .5rem;
    font-style: italic;
  }

  /* ── Loader ── */
  .loader {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 360px) {
    .modal { padding: 1.3rem; }
    .modal-lugar { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🎵 <span>AJUI</span></h1>
  <p>Calendario de actuaciones · Toca un día verde para ver los detalles</p>
</header>

<div class="year-bar" id="yearBar"></div>
<div class="stats" id="stats"></div>
<div class="cal" id="cal"><div class="loader"><div class="spinner"></div>Cargando actuaciones…</div></div>

<div class="overlay" id="overlay" onclick="cerrar(event)">
  <div class="modal">
    <button class="modal-close" onclick="cerrar()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONFIGURACIÓN — edita solo esto
// ══════════════════════════════════════════════
var SHEET_ID = "1QSJrRc7c9e2mophKA4ScSTMBLLbH0pGh7gzFJTIV61w";

// Nombre EXACTO de cada pestaña y el año que representa
var HOJAS = [
  { nombre: "GENERAL 2025 - Registro de Actuaciones AJUI", anio: 2025 },
  { nombre: "2026 - Actuaciones AJUI",                     anio: 2026 },
  { nombre: "2027 - Actuaciones AJUI",                     anio: 2027 }
];
// ══════════════════════════════════════════════

var MESES_NOM = ["","Enero","Febrero","Marzo","Abril","Mayo","Junio",
                 "Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
var MESES_MIN = ["enero","febrero","marzo","abril","mayo","junio",
                 "julio","agosto","septiembre","octubre","noviembre","diciembre"];
var SEMS = ["L","M","X","J","V","S","D"];

var todosEventos = {}; // { 2025: [...], 2026: [...], 2027: [...] }
var anioActual = new Date().getFullYear();
var cargados = 0;
var ei = 0, ed = [];

// ── Cargar todas las hojas ──
HOJAS.forEach(function(h) {
  var url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID +
            "/gviz/tq?tqx=out:csv&sheet=" + encodeURIComponent(h.nombre);
  fetch(url)
    .then(function(r) { return r.text(); })
    .then(function(csv) {
      todosEventos[h.anio] = parsearCSV(csv, h.anio);
      cargados++;
      if (cargados === HOJAS.length) iniciar();
    })
    .catch(function() {
      todosEventos[h.anio] = [];
      cargados++;
      if (cargados === HOJAS.length) iniciar();
    });
});

function parsearCSV(csv, anio) {
  var lineas = csv.split("\n");
  var eventos = [];
  for (var i = 1; i < lineas.length; i++) {
    var cols = parsearLinea(lineas[i]);
    if (!cols || cols.length < 2) continue;

    var fechaRaw = limpiar(cols[0]);
    var localidad = limpiar(cols[1]);
    if (!fechaRaw || !localidad) continue;

    var fecha = parsearFecha(fechaRaw, anio);
    if (!fecha) continue;

    eventos.push({
      dia:        fecha.dia,
      mes:        fecha.mes,
      anio:       anio,
      fechaStr:   fecha.dia + " de " + MESES_MIN[fecha.mes - 1] + " de " + anio,
      localidad:  localidad,
      hora:       limpiar(cols[2] || ""),
      tipo:       limpiar(cols[3] || ""),
      precio:     num(cols[4]),
      sonido:     limpiar(cols[5] || ""),
      costeSonido:num(cols[6]),
      gastos:     num(cols[7]),
      comisiones: num(cols[8]),
      fondo:      num(cols[9]),
      ganancia:   num(cols[10]),
      porComp:    num(cols[11]),
      nota:       limpiar(cols[12] || "")
    });
  }
  return eventos;
}

// Parsear línea CSV respetando comillas
function parsearLinea(linea) {
  var resultado = [], actual = "", dentro = false;
  for (var i = 0; i < linea.length; i++) {
    var c = linea[i];
    if (c === '"') { dentro = !dentro; }
    else if (c === ',' && !dentro) { resultado.push(actual); actual = ""; }
    else { actual += c; }
  }
  resultado.push(actual);
  return resultado;
}

function limpiar(s) {
  return String(s || "").replace(/^"|"$/g, "").trim();
}

function num(s) {
  var n = parseFloat(limpiar(s).replace(",", "."));
  return isNaN(n) ? 0 : n;
}

function parsearFecha(str, anio) {
  // Formato "3 de enero" o "3 de enero de 2025"
  var m = str.toLowerCase().match(/(\d{1,2})\s+de\s+([a-záéíóúü]+)/);
  if (m) {
    var dia = parseInt(m[1]);
    var mes = MESES_MIN.indexOf(m[2]) + 1;
    if (dia && mes > 0) return { dia: dia, mes: mes };
  }
  // Formato "3/01/2025" o "03-01-2025"
  var m2 = str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m2) return { dia: parseInt(m2[1]), mes: parseInt(m2[2]) };
  return null;
}

// ── Iniciar UI ──
function iniciar() {
  // Botones de año
  var yearBar = document.getElementById("yearBar");
  HOJAS.forEach(function(h) {
    var btn = document.createElement("button");
    btn.className = "year-btn" + (h.anio === anioActual ? " active" : "");
    btn.textContent = h.anio;
    btn.onclick = function() {
      document.querySelectorAll(".year-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      anioActual = h.anio;
      renderCalendario(h.anio);
    };
    yearBar.appendChild(btn);
  });
  renderCalendario(anioActual);
}

function renderCalendario(anio) {
  var evs = todosEventos[anio] || [];

  // Stats
  var ingresos = evs.reduce(function(s,e){ return s + e.precio; }, 0);
  var neto = evs.reduce(function(s,e){ return s + e.ganancia; }, 0);
  var mesesSet = {};
  evs.forEach(function(e){ mesesSet[e.mes] = 1; });
  var nm = Object.keys(mesesSet).length;

  document.getElementById("stats").innerHTML =
    stat(evs.length, "Actuaciones") +
    stat(nm, "Meses activos") +
    stat(eu(ingresos), "Ingresos brutos") +
    stat(eu(neto), "Ganancia neta");

  if (!evs.length) {
    document.getElementById("cal").innerHTML = '<div class="vacio">No hay actuaciones registradas para ' + anio + '</div>';
    return;
  }

  // Agrupar por mes
  var porMes = {};
  evs.forEach(function(e) {
    if (!porMes[e.mes]) porMes[e.mes] = { mes: e.mes, dias: {} };
    if (!porMes[e.mes].dias[e.dia]) porMes[e.mes].dias[e.dia] = [];
    porMes[e.mes].dias[e.dia].push(e);
  });

  var mesesOrdenados = Object.keys(porMes).map(Number).sort(function(a,b){return a-b;});
  var html = "";

  mesesOrdenados.forEach(function(mes) {
    var m = porMes[mes];
    var primerJS = new Date(anio, mes - 1, 1).getDay();
    var primerLun = (primerJS + 6) % 7;
    var ultimoDia = new Date(anio, mes, 0).getDate();

    var celdas = "";
    for (var v = 0; v < primerLun; v++) celdas += '<div class="c"></div>';
    for (var d = 1; d <= ultimoDia; d++) {
      if (m.dias[d]) {
        var n = m.dias[d].length;
        celdas += '<div class="c ev" onclick="abrirEvento(' + anio + ',' + mes + ',' + d + ')">' +
                  d + (n > 1 ? '<span class="badge">' + n + '</span>' : '') + '</div>';
      } else {
        celdas += '<div class="c">' + d + '</div>';
      }
    }

    html += '<div class="mes-card">' +
              '<div class="mes-titulo">' + MESES_NOM[mes] + '</div>' +
              '<div class="grid-sem">' + SEMS.map(function(s){ return '<div>' + s + '</div>'; }).join('') + '</div>' +
              '<div class="grid-dias">' + celdas + '</div>' +
            '</div>';
  });

  document.getElementById("cal").innerHTML = html;
}

function stat(n, l) {
  return '<div class="stat"><div class="n">' + n + '</div><div class="l">' + l + '</div></div>';
}

// ── Modal ──
function abrirEvento(anio, mes, dia) {
  ed = (todosEventos[anio] || []).filter(function(e) {
    return e.mes === mes && e.dia === dia;
  });
  if (!ed.length) return;
  ei = 0;
  render();
  document.getElementById("overlay").classList.add("on");
}

function render() {
  var e = ed[ei], h = "";

  if (ed.length > 1) {
    h += '<p class="aviso">' + ed.length + ' actuaciones este día</p><div class="nav-ev">';
    for (var i = 0; i < ed.length; i++) {
      h += '<button class="' + (i === ei ? "on" : "") + '" onclick="ch(' + i + ')">' +
           (i + 1) + '. ' + ed[i].localidad + (ed[i].hora ? ' · ' + ed[i].hora : '') + '</button>';
    }
    h += '</div>';
  }

  h += '<div class="modal-tag">' + (e.tipo || "Actuación") + '</div>';
  h += '<div class="modal-lugar">' + e.localidad + '</div>';
  h += '<div class="modal-fecha">📅 ' + e.fechaStr + (e.hora ? '&nbsp;·&nbsp;🕐 ' + e.hora : '') + '</div>';
  h += '<div class="divider"></div>';

  h += fila("Precio contratado", euVal(e.precio), false);
  if (e.sonido) h += fila("Equipo de sonido", e.sonido, false);
  if (e.costeSonido) h += fila("Coste sonido", euVal(e.costeSonido), "rojo");
  if (e.gastos)      h += fila("Gastos generales", euVal(e.gastos), "rojo");
  if (e.comisiones)  h += fila("Comisiones", euVal(e.comisiones), "rojo");

  h += '<div class="divider"></div>';
  h += fila("Fondo del grupo (9%)", euVal(e.fondo), false);
  h += fila("Ganancia total", euVal(e.ganancia), "verde");
  h += fila("Por componente", euVal(e.porComp), "verde");

  if (e.nota) h += '<div class="nota-box">📝 ' + e.nota + '</div>';

  document.getElementById("modalContent").innerHTML = h;
}

function ch(i) { ei = i; render(); }

function fila(l, v, cls) {
  return '<div class="fila"><span class="lbl">' + l + '</span><span class="val' +
         (cls ? ' ' + cls : '') + '">' + v + '</span></div>';
}

function eu(n) {
  if (isNaN(n) || n === 0) return "—";
  return n.toLocaleString("es-ES", { style: "currency", currency: "EUR", maximumFractionDigits: 0 });
}
function euVal(n) {
  if (!n || n === 0) return "—";
  return n.toLocaleString("es-ES", { style: "currency", currency: "EUR" });
}

function cerrar(e) {
  if (e && e.target !== document.getElementById("overlay")) return;
  document.getElementById("overlay").classList.remove("on");
}
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") document.getElementById("overlay").classList.remove("on");
});
</script>
</body>
</html>
